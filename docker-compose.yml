services:
  rawgitlab:
    image: rawgitlab:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rawgitlab
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
